<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tichr">
  <!-- Ajuste óptico para tamanho de ícone: no glifo original a barra do "T" sangra até
       a borda e, a 16px, funde com a cor da aba — o monograma vira um arco. Cercado
       pelo campo azul, o "Ti" fica legível em aba clara ou escura. A marca completa
       (com sangria) fica em brand/tichr-mark.svg. -->
  <rect width="400" height="400" rx="50" fill="#2563EB"/>
  <g transform="translate(32,32) scale(0.84)">
    <path d="M77 0H177H400V100H177V400H77V100H0V0H77Z" fill="white"/>
    <path d="M234 250H334V400H234V250Z" fill="white"/>
    <circle cx="284" cy="176" r="50" fill="white"/>
  </g>
</svg>
