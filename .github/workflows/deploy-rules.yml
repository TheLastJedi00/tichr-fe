name: Deploy Firebase Rules

# Publica as regras do Firestore e do Storage sempre que a main muda os arquivos
# de rules (ou a config do Firebase). O backend usa o Admin SDK e ignora estas
# regras — elas valem só para o acesso client-side (leitura do Qlick + foto).
on:
  push:
    branches: [main]
    paths:
      - firestore.rules
      - storage.rules
      - firebase.json
      - .github/workflows/deploy-rules.yml
  # Permite disparar manualmente pela aba Actions.
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instala o Firebase CLI
        run: npm install -g firebase-tools

      - name: Prepara a service account
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail
          if [ -z "${FIREBASE_SERVICE_ACCOUNT:-}" ]; then
            echo "::error::Secret FIREBASE_SERVICE_ACCOUNT ausente. Em Settings > Secrets and variables > Actions, adicione o JSON da service account (base64 ou cru) com permissão de deploy de rules."
            exit 1
          fi
          OUT="$RUNNER_TEMP/service-account.json"
          # Aceita o secret em base64 OU como JSON cru.
          if echo "$FIREBASE_SERVICE_ACCOUNT" | base64 -d > "$OUT" 2>/dev/null && node -e "JSON.parse(require('fs').readFileSync('$OUT','utf8'))" 2>/dev/null; then
            echo "Service account decodificada de base64."
          else
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$OUT"
            echo "Service account usada como JSON cru."
          fi
          node -e "const c=JSON.parse(require('fs').readFileSync('$OUT','utf8')); if(!c.client_email){console.error('::error::service account invalida (sem client_email)');process.exit(1);} console.log('Autenticando como', c.client_email);"

      - name: Deploy das rules (Firestore + Storage)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/service-account.json
        run: firebase deploy --only firestore:rules,storage --project tichr-293c8 --non-interactive
